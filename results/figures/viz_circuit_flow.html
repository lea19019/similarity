  left: 12px;

  height: 10px;
  border-radius: 50%;

canvas {

// ─── Canvas setup ───
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ─── State ───
let currentLang = 'en';
let playing = true;
let speed = 1.0;
let threshold = 0.15;
let importanceMode = 'patching';
let time = 0;
let particles = [];
let hoveredNode = null;
let selectedNode = null;
let camera = { x: 0, y: 0, zoom: 1 };

// ─── Layout ───
const N_LAYERS = 18;
const N_HEADS = 8;
const MARGIN = { top: 70, bottom: 40, left: 60, right: 60 };

function getNodePositions() {
  const positions = {};
  const layerWidth = (W - MARGIN.left - MARGIN.right) / (N_LAYERS - 1);
  const headSpacing = (H - MARGIN.top - MARGIN.bottom - 40) / (N_HEADS + 1); // +1 for MLP

  for (let l = 0; l < N_LAYERS; l++) {
    const x = MARGIN.left + l * layerWidth;
    for (let h = 0; h < N_HEADS; h++) {
      const y = MARGIN.top + h * headSpacing;
      positions[`L${l}H${h}`] = { x, y, type: 'head', layer: l, head: h };
    }
    // MLP at bottom of each layer
    positions[`MLP${l}`] = {
      x, y: MARGIN.top + N_HEADS * headSpacing + 20,
      type: 'mlp', layer: l
    };
  }
  return positions;
}

function getNodeImportance(lang, nodeId) {
  const d = DATA[lang];
  if (!d) return 0;

  if (nodeId.startsWith('MLP')) {
    const layer = parseInt(nodeId.slice(3));
    if (importanceMode === 'eap') {
      return (d.eap_mlp || [])[layer] || 0;
    } else if (importanceMode === 'weight') {
      return (d.mlp_importance || [])[layer] || 0;
    } else {
      return (d.mlp_patching || [])[layer] || 0;
    }
  } else {
    const m = nodeId.match(/L(\d+)H(\d+)/);
    if (!m) return 0;
    const l = parseInt(m[1]), h = parseInt(m[2]);
    if (importanceMode === 'eap') {
      return ((d.eap_heads || [])[l] || [])[h] || 0;
    } else if (importanceMode === 'weight') {
      return ((d.head_importance || [])[l] || [])[h] || 0;
    } else {
      return ((d.patching || [])[l] || [])[h] || 0;
    }
  }
}

function getEdges(lang) {
  const d = DATA[lang];
  if (!d || !d.connections) return [];
  return d.connections.filter(e => Math.abs(e.weight) >= threshold);
}

// ─── Particles ───
function spawnParticles(edges, positions) {
  // Spawn new particles along edges proportional to weight
  for (const edge of edges) {
    const src = positions[edge.src];
    const dst = positions[edge.dst];
    if (!src || !dst) continue;

    // Spawn rate proportional to edge weight
    const rate = Math.abs(edge.weight) * 0.08 * speed;
    if (Math.random() < rate) {
      particles.push({
        x: src.x, y: src.y,
        tx: dst.x, ty: dst.y,
        progress: 0,
        speed: (0.003 + Math.random() * 0.004) * speed,
        weight: Math.abs(edge.weight),
        srcLayer: edge.srcLayer,
        dstLayer: edge.dstLayer,
        alpha: 1
      });
    }
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.progress += p.speed;
    if (p.progress >= 1) {
      // Fade out
      p.alpha -= 0.05;
      if (p.alpha <= 0) {
        particles.splice(i, 1);
      }
    }
    // Curved path
    const t = Math.min(p.progress, 1);
    const ease = t * t * (3 - 2 * t); // smoothstep
    p.x = p.x + (((1 - ease) * p.x + ease * p.tx) - p.x) * 0.1;
    // Direct lerp for actual position
    p.cx = (1 - ease) * (p.x) + ease * p.tx;
    p.cy = (1 - ease) * (p.y) + ease * p.ty;
    // Add slight curve
    const midBow = Math.sin(t * Math.PI) * 15 * (p.weight);
    p.cy -= midBow;
  }

  // Cap particles
  if (particles.length > 2000) {
    particles = particles.slice(-1500);
  }
}

// ─── Rendering ───
function getNodeColor(nodeId, importance) {
  const isMLp = nodeId.startsWith('MLP');
  if (isMLp) {
    const a = Math.min(1, importance * 2 + 0.15);
    return `rgba(78, 205, 196, ${a})`;
  } else {
    const a = Math.min(1, importance * 2 + 0.15);
    return `rgba(255, 107, 107, ${a})`;
  }
}

function getNodeRadius(importance) {
  return 3 + Math.sqrt(Math.max(0, importance)) * 12;
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  const positions = getNodePositions();
  const edges = getEdges(currentLang);

  // Apply camera
  ctx.save();
  ctx.translate(camera.x, camera.y);
  ctx.scale(camera.zoom, camera.zoom);

  // ─── Layer labels ───
  ctx.fillStyle = '#444';
  ctx.font = '10px Menlo, Consolas, monospace';
  ctx.textAlign = 'center';
  for (let l = 0; l < N_LAYERS; l++) {
    const x = MARGIN.left + l * ((W - MARGIN.left - MARGIN.right) / (N_LAYERS - 1));
    ctx.fillText(`L${l}`, x, MARGIN.top - 18);
  }

  // ─── Head labels (left side) ───
  ctx.textAlign = 'right';
  const headSpacing = (H - MARGIN.top - MARGIN.bottom - 40) / (N_HEADS + 1);
  for (let h = 0; h < N_HEADS; h++) {
    const y = MARGIN.top + h * headSpacing;
    ctx.fillText(`H${h}`, MARGIN.left - 12, y + 3);
  }
  ctx.fillText('MLP', MARGIN.left - 12, MARGIN.top + N_HEADS * headSpacing + 23);

  // ─── Edges ───
  for (const edge of edges) {
    const src = positions[edge.src];
    const dst = positions[edge.dst];
    if (!src || !dst) continue;

    const w = Math.abs(edge.weight);
    ctx.beginPath();
    ctx.moveTo(src.x, src.y);

    // Bezier curve
    const mx = (src.x + dst.x) / 2;
    const my = (src.y + dst.y) / 2 - w * 20;
    ctx.quadraticCurveTo(mx, my, dst.x, dst.y);

    ctx.strokeStyle = `rgba(100, 100, 180, ${Math.min(0.4, w * 0.8)})`;
    ctx.lineWidth = Math.max(0.3, w * 3);
    ctx.stroke();
  }

  // ─── Particles ───
  for (const p of particles) {
    const t = Math.min(p.progress, 1);
    const ease = t * t * (3 - 2 * t);
    const px = (1 - ease) * p.x + ease * p.tx;
    const srcY = p.y || positions[Object.keys(positions)[0]]?.y || 0;
    const tgtY = p.ty || srcY;
    const py = (1 - ease) * srcY + ease * tgtY - Math.sin(t * Math.PI) * 15 * p.weight;

    const r = 1.5 + p.weight * 2;
    const alpha = p.alpha * Math.min(1, p.weight * 3);

    // Glow
    const grad = ctx.createRadialGradient(px, py, 0, px, py, r * 3);
    grad.addColorStop(0, `rgba(160, 140, 255, ${alpha * 0.6})`);
    grad.addColorStop(1, `rgba(160, 140, 255, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(px, py, r * 3, 0, Math.PI * 2);
    ctx.fill();

    // Core
    ctx.fillStyle = `rgba(200, 190, 255, ${alpha})`;
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // ─── Nodes ───
  const maxImp = getMaxImportance();

  for (const [id, pos] of Object.entries(positions)) {
    let imp = getNodeImportance(currentLang, id);
    const normImp = maxImp > 0 ? imp / maxImp : 0;
    const r = getNodeRadius(normImp);

    // Glow for important nodes
    if (normImp > 0.1) {
      const grad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, r * 2.5);
      const isMLp = id.startsWith('MLP');
      if (isMLp) {
        grad.addColorStop(0, `rgba(78, 205, 196, ${normImp * 0.3})`);
      } else {
        grad.addColorStop(0, `rgba(255, 107, 107, ${normImp * 0.3})`);
      }
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r * 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Node body
    ctx.fillStyle = getNodeColor(id, normImp);
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
    ctx.fill();

    // Border
    const isHovered = hoveredNode === id;
    const isSelected = selectedNode === id;
    if (isHovered || isSelected) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    } else if (normImp > 0.3) {
      ctx.strokeStyle = `rgba(255,255,255,${normImp * 0.5})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Label for important nodes
    if (normImp > 0.15 || isHovered || isSelected) {
      ctx.fillStyle = `rgba(255,255,255,${Math.max(0.6, normImp)})`;
      ctx.font = `${isHovered || isSelected ? 'bold ' : ''}10px Menlo, Consolas, monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(id, pos.x, pos.y - r - 5);
    }
  }

  ctx.restore();

  // ─── Pulsing wave indicator ───
  if (playing) {
    const waveX = MARGIN.left + ((time * 0.3 * speed) % 1) * (W - MARGIN.left - MARGIN.right);
    ctx.fillStyle = 'rgba(120, 100, 255, 0.05)';
    ctx.fillRect(waveX - 30, 0, 60, H);
  }
}

function getMaxImportance() {
  const d = DATA[currentLang];
  if (!d) return 1;
  let max = 0;

  for (let l = 0; l < N_LAYERS; l++) {
    for (let h = 0; h < N_HEADS; h++) {
      max = Math.max(max, Math.abs(getNodeImportance(currentLang, `L${l}H${h}`)));
    }
    max = Math.max(max, Math.abs(getNodeImportance(currentLang, `MLP${l}`)));
  }
  return max || 1;
}

// ─── Tooltip / hover ───
canvas.addEventListener('mousemove', (e) => {
  const positions = getNodePositions();
  const mx = (e.clientX - camera.x) / camera.zoom;
  const my = (e.clientY - camera.y) / camera.zoom;
  const maxImp = getMaxImportance();

  hoveredNode = null;
  for (const [id, pos] of Object.entries(positions)) {
    const imp = getNodeImportance(currentLang, id);
    const normImp = maxImp > 0 ? imp / maxImp : 0;
    const r = getNodeRadius(normImp);
    const dx = mx - pos.x, dy = my - pos.y;
    if (dx * dx + dy * dy < (r + 4) * (r + 4)) {
      hoveredNode = id;
      const tooltip = document.getElementById('tooltip');
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 15) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';

      // Find connections
      const edges = DATA[currentLang]?.connections || [];
      const incoming = edges.filter(e => e.dst === id && Math.abs(e.weight) >= threshold)
        .sort((a, b) => Math.abs(b.weight) - Math.abs(a.weight)).slice(0, 5);
      const outgoing = edges.filter(e => e.src === id && Math.abs(e.weight) >= threshold)
        .sort((a, b) => Math.abs(b.weight) - Math.abs(a.weight)).slice(0, 5);

      let html = `<b>${id}</b><br>`;
      html += `Importance: ${imp.toFixed(3)}<br>`;
      if (incoming.length) {
        html += `<br><b>← From:</b><br>`;
        incoming.forEach(e => html += `  ${e.src} (${e.weight.toFixed(3)})<br>`);
      }
      if (outgoing.length) {
        html += `<br><b>→ To:</b><br>`;
        outgoing.forEach(e => html += `  ${e.dst} (${e.weight.toFixed(3)})<br>`);
      }
      tooltip.innerHTML = html;
      break;
    }
  }
  if (!hoveredNode) {
    document.getElementById('tooltip').style.display = 'none';
  }
  canvas.style.cursor = hoveredNode ? 'pointer' : 'default';
});

canvas.addEventListener('click', (e) => {
  selectedNode = hoveredNode;
});

// ─── Zoom ───
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const newZoom = Math.max(0.3, Math.min(5, camera.zoom * factor));

  // Zoom toward mouse
  camera.x = e.clientX - (e.clientX - camera.x) * (newZoom / camera.zoom);
  camera.y = e.clientY - (e.clientY - camera.y) * (newZoom / camera.zoom);
  camera.zoom = newZoom;
});

// ─── Pan ───
let dragging = false, dragStart = {};
canvas.addEventListener('mousedown', (e) => {
  if (!hoveredNode) {
    dragging = true;
    dragStart = { x: e.clientX - camera.x, y: e.clientY - camera.y };
  }
});
canvas.addEventListener('mousemove', (e) => {
  if (dragging) {
    camera.x = e.clientX - dragStart.x;
    camera.y = e.clientY - dragStart.y;
  }
});
canvas.addEventListener('mouseup', () => dragging = false);

// ─── Controls ───
const langSelect = document.getElementById('langSelect');
Object.keys(DATA).forEach(lang => {
  const opt = document.createElement('option');
  opt.value = lang;
  opt.textContent = { en: 'English', es: 'Spanish', fr: 'French', ru: 'Russian', tr: 'Turkish', sw: 'Swahili', qu: 'Quechua' }[lang] || lang;
  langSelect.appendChild(opt);
});
langSelect.addEventListener('change', () => {
  currentLang = langSelect.value;
  particles = [];
});

document.getElementById('btnPlay').addEventListener('click', () => {
  playing = true;
  document.getElementById('btnPlay').classList.add('active');
  document.getElementById('btnPause').classList.remove('active');
});
document.getElementById('btnPause').addEventListener('click', () => {
  playing = false;
  document.getElementById('btnPause').classList.add('active');
  document.getElementById('btnPlay').classList.remove('active');
});
document.getElementById('speedSlider').addEventListener('input', (e) => {
  speed = parseFloat(e.target.value);
});
document.getElementById('threshSlider').addEventListener('input', (e) => {
  threshold = parseFloat(e.target.value);
  particles = [];
});
document.getElementById('importanceMode').addEventListener('change', (e) => {
  importanceMode = e.target.value;
});

// ─── Animation loop ───
function loop() {
  if (playing) {
    time += 0.016;
    const positions = getNodePositions();
    const edges = getEdges(currentLang);
    spawnParticles(edges, positions);
    updateParticles();
  }
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
